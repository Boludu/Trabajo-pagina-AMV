<!DOCTYPE html>
<html lang="es">

    <script src="../javascript/PaginaScript.js"></script>
</head>
<body>
    <header>
        <h1>Bienvenido a mi página de AMV</h1>
    </header>
    <nav>
    <ul>
        <li><a href="/Pagina_Principal.html">Inicio</a></li>
        <li><a href="About.html">Acerca de</a></li>
        <li><a href="Contacto.html">Contacto</a></li>
        <li><a href="Galeria.html">Galeria</a></li>
    </ul>
</nav>
<main>
    <div>
        <p class="cuerpo_central">
            Si quieres apoyar mi contenido,
            me puedes seguir en mis redes sociales y estar atento a mis futuras publicaciones
        </p>
        
        <ul class="iconos">
            <li>
                <a href="https://www.instagram.com" target="_blank">
                    <img src="../assets/iconos/instagram 2.webp" alt="Instagram">
                    Instagram
                </a>
            </li>

            <li>
                <a href="https://www.tiktok.com" target="_blank">
                    <img src="../assets/iconos/tiktok2.png" alt="TikTok">
                    TikTok
                </a>
            </li>

            <li>
                <a href="https://www.twitter.com" target="_blank">
                    <img src="../assets/iconos/twitter.png" alt="Twitter">
                    Twitter
                </a>
            </li>

            <li>
                <a href="https://www.facebook.com" target="_blank">
                    <img src="../assets/iconos/facebook.webp" alt="Facebook">
                    Facebook
                </a>
            </li>

            <li>
                <a href="https://www.pinterest.com" target="_blank">
                    <img src="../assets/iconos/pinterest logo.png" alt="Pinterest">
                    Pinterest
                </a>
            </li>

            <li>
                <a href="https://www.youtube.com" target="_blank">
                    <img src="../assets/iconos/youtube.png" alt="YouTube">
                    YouTube
                </a>
            </li>
        </ul>
    </div>


    <div class="contacto">
        <h2>Contacto</h2>
        <form action="#" method="post">
            <label for="nombre">Tu nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required>

            <label for="email">Tu email:</label>
            <input type="email" id="email" name="email" placeholder="Escribe tu email" required>

            <label for="mensaje">Tu mensaje:</label>
            <textarea id="mensaje" name="mensaje" placeholder="Escribe el mensaje que quieras dejar" rows="4" required></textarea>

            <button type="submit">Enviar</button>
        </form>
    </div>
</main>
</body>
</html>
